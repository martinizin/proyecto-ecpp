{% extends "base_auth.html" %}

{% block title %}Contrasena restablecida{% endblock %}

{% block content %}
<div class="text-center">
    <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
    </div>
    <h1 class="text-2xl font-bold text-gray-800 mb-2">¡Contrasena restablecida!</h1>
    <p class="text-gray-600 text-sm mb-6">
        Su contraseña fue cambiada exitosamente. Ya puede iniciar sesión con su nueva contraseña.
    </p>
    <a href="{% url 'usuarios:login' %}" class="inline-block w-full bg-primary hover:bg-secondary text-white font-semibold py-2.5 px-6 rounded-lg transition-colors">
        Iniciar sesion
    </a>
</div>
{% endblock %}
