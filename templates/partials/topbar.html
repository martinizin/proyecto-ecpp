<!-- Topbar — Fixed top bar, offset by sidebar on desktop -->
<!-- Expects Alpine.js x-data="{ sidebarOpen: false }" on a parent element -->

<header
    class="fixed top-0 right-0 h-16 bg-white border-b border-gray-200 z-30
           left-0 lg:left-64 transition-all duration-300"
    role="banner"
>
    <div class="flex items-center justify-between h-full px-4 lg:px-6">
        <!-- Left: Hamburger (mobile) + Page title -->
        <div class="flex items-center gap-3">
            <!-- Hamburger button — mobile only -->
            <button
                @click="sidebarOpen = true"
                class="lg:hidden p-2 -ml-2 rounded-md text-gray-500 hover:text-gray-700 hover:bg-gray-100 transition-colors"
                aria-label="Abrir menú"
            >
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
                </svg>
            </button>

            <!-- Page title — uses the same title block value or a context variable -->
            {% if page_title %}
            <h1 class="text-base lg:text-lg font-semibold text-gray-800 truncate">
                {{ page_title }}
            </h1>
            {% endif %}
        </div>

        <!-- Right: Notifications + User dropdown -->
        <div class="flex items-center gap-2">
            <!-- Notification bell (placeholder) -->
            <button
                class="p-2 rounded-md text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors relative"
                aria-label="Notificaciones"
                title="Notificaciones"
            >
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" />
                </svg>
            </button>

            <!-- User dropdown (desktop) -->
            <div class="hidden sm:block" x-data="{ userOpen: false }">
                <button
                    @click="userOpen = !userOpen"
                    @click.outside="userOpen = false"
                    class="flex items-center gap-2 px-3 py-1.5 rounded-lg hover:bg-gray-100 transition-colors"
                >
                    <!-- Avatar -->
                    <div class="w-8 h-8 rounded-full bg-primary/10 text-primary flex items-center justify-center text-sm font-semibold">
                        {{ user.first_name|make_list|first|default:"U" }}
                    </div>
                    <div class="text-left hidden md:block">
                        <p class="text-sm font-medium text-gray-700 leading-tight">{{ user.get_full_name|default:user.username }}</p>
                        <p class="text-xs text-gray-400 leading-tight">{{ user.get_rol_display|default:user.rol }}</p>
                    </div>
                    <!-- Chevron -->
                    <svg class="w-4 h-4 text-gray-400 hidden md:block" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
                    </svg>
                </button>

                <!-- Dropdown menu -->
                <div
                    x-show="userOpen"
                    x-transition:enter="transition ease-out duration-150"
                    x-transition:enter-start="opacity-0 scale-95"
                    x-transition:enter-end="opacity-100 scale-100"
                    x-transition:leave="transition ease-in duration-100"
                    x-transition:leave-start="opacity-100 scale-100"
                    x-transition:leave-end="opacity-0 scale-95"
                    class="absolute right-4 mt-2 w-48 bg-white rounded-lg shadow-lg border border-gray-200 py-1 z-50"
                    x-cloak
                >
                    <div class="px-4 py-2 border-b border-gray-100">
                        <p class="text-sm font-medium text-gray-700">{{ user.get_full_name|default:user.username }}</p>
                        <p class="text-xs text-gray-400">{{ user.email }}</p>
                    </div>
                    <a href="{% url 'usuarios:perfil' %}" class="flex items-center gap-2 px-4 py-2 text-sm text-gray-600 hover:bg-gray-50 transition-colors">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
                        </svg>
                        Mi Perfil
                    </a>
                    <a href="{% url 'usuarios:cambiar_contrasena' %}" class="flex items-center gap-2 px-4 py-2 text-sm text-gray-600 hover:bg-gray-50 transition-colors">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
                        </svg>
                        Cambiar Contraseña
                    </a>
                    <div class="border-t border-gray-100 my-1"></div>
                    <a href="{% url 'usuarios:logout' %}" class="flex items-center gap-2 px-4 py-2 text-sm text-red-600 hover:bg-red-50 transition-colors">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9" />
                        </svg>
                        Cerrar Sesión
                    </a>
                </div>
            </div>
        </div>
    </div>
</header>
